name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: conecta_volei_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d conecta_volei_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:4-management-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_NAME: Conecta Volei Backend Lab
      ENVIRONMENT: test
      DEBUG: "false"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/conecta_volei_test
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/conecta_volei_test
      REDIS_URL: redis://localhost:6379/0
      RABBITMQ_URL: amqp://guest:guest@localhost:5672/
      JWT_SECRET_KEY: conecta-volei-ci-secret
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      JWT_REFRESH_TOKEN_EXPIRE_MINUTES: "43200"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run migrations
        run: alembic upgrade head

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run Pytest
        run: python -m pytest

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build Docker image
        run: docker build -t conecta-volei-backend-lab:ci .