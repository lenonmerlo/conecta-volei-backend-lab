services:
  postgres:
    image: postgres:17-alpine
    container_name: conecta-volei-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: conecta_volei_lab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - conecta_volei_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d conecta_volei_lab"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: conecta-volei-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: conecta-volei-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
    container_name: conecta-volei-api
    restart: unless-stopped
    environment:
      APP_NAME: Conecta Volei Backend Lab
      ENVIRONMENT: local
      DEBUG: "true"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/conecta_volei_lab
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET_KEY: conecta-volei-local-secret
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      JWT_REFRESH_TOKEN_EXPIRE_MINUTES: "43200"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: conecta-volei-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - redis
      - rabbitmq

  grafana:
    image: grafana/grafana:11.4.0
    container_name: conecta-volei-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - conecta_volei_grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  conecta_volei_postgres_data:
  conecta_volei_grafana_data:

